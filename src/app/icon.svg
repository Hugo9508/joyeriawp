<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c547"/>
      <stop offset="50%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#b8962e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#b8962e"/>
    </linearGradient>
  </defs>
  <!-- Fondo circular oscuro -->
  <circle cx="256" cy="256" r="250" fill="#1a170f"/>
  <!-- Borde dorado fino -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.5"/>
  <!-- Letras JA centradas -->
  <text x="256" y="295" font-family="Georgia, 'Playfair Display', 'Times New Roman', serif" font-size="220" font-weight="bold" fill="url(#gold)" text-anchor="middle" letter-spacing="-8">JA</text>
</svg>
